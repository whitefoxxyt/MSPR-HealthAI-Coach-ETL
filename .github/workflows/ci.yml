name: CI - ETL

on:
  push:
    branches: [ "master", "main" ]
    tags: ['v*.*.*']
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation de Ruff
        run: pip install ruff==0.15.6

      - name: Linting avec Ruff
        run: ruff check --config etl/pyproject.toml ./etl

      - name: Vérification du formatage avec Ruff
        run: ruff format --check --config etl/pyproject.toml ./etl

  test:
    name: Tests unitaires (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances
        run: pip install -r etl/requirements-dev.txt

      - name: Tests unitaires
        run: cd etl && python -m pytest tests/ -m "not integration" -v

  test-integration:
    name: Tests d'intégration (Pytest + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: healthcoach
          POSTGRES_USER: healthcoach
          POSTGRES_PASSWORD: healthcoach
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances
        run: pip install -r etl/requirements-dev.txt

      - name: Tests d'intégration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: healthcoach
          DB_USER: healthcoach
          DB_PASSWORD: healthcoach
        run: cd etl && python -m pytest tests/ -m integration -v

  publish:
    name: Publication de l'image Docker
    needs: [lint, test, test-integration]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
