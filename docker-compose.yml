services:
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: healthai_etl
    restart: unless-stopped
    environment:
      DB_HOST: mspr-healthai-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-healthai}
      DB_USER: ${DB_USER:-healthai_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 2 * * *}
    volumes:
      - ./data:/app/data
    networks:
      - mspr_data_network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mspr_data_network:
    external: true
